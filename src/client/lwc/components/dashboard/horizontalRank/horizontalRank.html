<template>
    <div class={containerClass}>
        <div
            class="horizontal-rank-inner flex h-full min-h-0 flex-col justify-between gap-1 text-neutral-100 dark:text-neutral-0">
            <div class="flex min-w-0 justify-between gap-2">
                <div class="min-w-0 truncate text-sm font-normal">{title}</div>
                <div class="shrink-0 text-xs font-normal">
                    <lightning-formatted-rich-text value={subTitle}></lightning-formatted-rich-text>
                </div>
            </div>
            <div class="flex min-w-0 flex-wrap items-center justify-between gap-2 lg:gap-4">
                <div class="min-w-0 shrink-0">
                    <span class="text-base font-medium sm:text-lg md:text-2xl lg:text-4xl">{mark}</span>
                    <span class="text-xs font-normal md:text-base lg:text-lg">{markExtra}</span>
                </div>
                <div class="horizontal-rank-bar w-28 min-w-0 shrink-0 sm:w-36 lg:w-40">
                    <div class="flex flex-col gap-[0.125rem]">
                        <template lwc:if={isLight}>
                            <!-- 3 steps -->
                            <div class="flex w-full gap-[0.125rem]">
                                <div class={step1Class}>
                                    <svg width="12" height="6">
                                        <path d="M0 0L6 6L12 0" class="fill-current"></path>
                                    </svg>
                                </div>
                                <div class={step2Class}>
                                    <svg width="12" height="6">
                                        <path d="M0 0L6 6L12 0" class="fill-current"></path>
                                    </svg>
                                </div>
                                <div class={step3Class}>
                                    <svg width="12" height="6">
                                        <path d="M0 0L6 6L12 0" class="fill-current"></path>
                                    </svg>
                                </div>
                            </div>
                            <div class="flex w-full gap-[0.125rem]">
                                <div class="h-2 grow rounded-sm bg-current text-score-alert"></div>
                                <div class="h-2 grow rounded-sm bg-current text-score-fair"></div>
                                <div
                                    class="h-2 grow rounded-sm bg-current text-score-excellent"></div>
                            </div>
                        </template>
                        <template lwc:else>
                            <!-- 5 steps -->
                            <div class="flex w-full gap-[0.125rem]">
                                <div class={step1Class}>
                                    <svg width="12" height="6">
                                        <path d="M0 0L6 6L12 0" class="fill-current"></path>
                                    </svg>
                                </div>
                                <div class={step2Class}>
                                    <svg width="12" height="6">
                                        <path d="M0 0L6 6L12 0" class="fill-current"></path>
                                    </svg>
                                </div>
                                <div class={step3Class}>
                                    <svg width="12" height="6">
                                        <path d="M0 0L6 6L12 0" class="fill-current"></path>
                                    </svg>
                                </div>
                                <div class={step4Class}>
                                    <svg width="12" height="6">
                                        <path d="M0 0L6 6L12 0" class="fill-current"></path>
                                    </svg>
                                </div>
                                <div class={step5Class}>
                                    <svg width="12" height="6">
                                        <path d="M0 0L6 6L12 0" class="fill-current"></path>
                                    </svg>
                                </div>
                            </div>
                            <div class="flex w-full gap-[0.125rem]">
                                <div class="h-2 grow rounded-sm bg-current text-score-alert"></div>
                                <div class="h-2 grow rounded-sm bg-current text-score-poor"></div>
                                <div class="h-2 grow rounded-sm bg-current text-score-fair"></div>
                                <div class="h-2 grow rounded-sm bg-current text-score-good"></div>
                                <div
                                    class="h-2 grow rounded-sm bg-current text-score-excellent"></div>
                            </div>
                        </template>

                        <div
                            class="flex justify-between gap-1 text-2xs font-medium text-neutral-50">
                            <span class="truncate">{lowLabel}</span>
                            <span class="shrink-0">{highLabel}</span>
                        </div>
                    </div>
                </div>
            </div>
            <div class="min-w-0 truncate text-2xs font-normal">{description}</div>
        </div>
    </div>
</template>
