<template>
    <div class="slds-utility-bar_container">
        <ul class="slds-utility-bar custom-utility-bar">
            <!-- Left side of the utility bar -->
            <li class="slds-utility-bar__item custom-utility-text custom-utility-left">
                <template lwc:if={isConnectorDisplayed}>
                    <lightning-button-icon
                        class="custom-utility-text-copy"
                        onclick={handleCopyUsername}
                        icon-name="utility:copy"
                        variant="bare"
                        alternative-text="copy"
                        title="Copy Username"></lightning-button-icon>
                    <a class="slds-truncate" href="#" onclick={handleUsernameClick}>
                        {usernameFormatted}
                    </a>
                    <div class="slds-vertical-separator"></div>
                    <lightning-button
                        variant="base"
                        label="Access Token"
                        title="Copy Access Token"
                        icon-name="utility:copy"
                        class="footer-utility-truncate custom-utility-text-copy"
                        onclick={handleCopyAccessToken}></lightning-button>
                </template>
            </li>
            <!-- Right side of the utility bar -->
            <li class="slds-utility-bar__item custom-utility-text custom-utility-right">
                <template lwc:if={hasErrors}>
                    <span
                        class="slds-truncate slds-text-color_error footer-error-message"
                        onclick={handleErrorClick}
                        style="cursor: pointer">
                        Errors: {formattedErrorCount} | {latestErrorMessage}
                    </span>
                </template>
                <h2 class="slds-truncate slds-m-left_x-small">
                    {versionFormatted} {salesforceVersionFormatted}
                </h2>
            </li>
        </ul>
        <template lwc:if={isErrorPanelOpen}>
            <div
                class="slds-utility-panel slds-grid slds-grid_vertical slds-is-open footer-error-panel"
                role="dialog"
                aria-labelledby="panel-heading-01">
                <header class="footer-error-panel-header">
                    <div class="footer-error-panel-header-inner">
                        <span class="slds-icon_container footer-error-panel-icon">
                            <svg class="slds-icon slds-icon_small" aria-hidden="true">
                                <use
                                    xlink:href="/assets/icons/utility-sprite/svg/symbols.svg#error"></use>
                            </svg>
                        </span>
                        <h2 id="panel-heading-01" class="footer-error-panel-title">Error Log</h2>
                    </div>
                    <button
                        type="button"
                        class="footer-error-panel-close"
                        title="Close Panel"
                        onclick={handleClosePanel}
                        aria-label="Close panel">
                        <svg class="slds-button__icon" aria-hidden="true">
                            <use
                                xlink:href="/assets/icons/utility-sprite/svg/symbols.svg#minimize_window"></use>
                        </svg>
                    </button>
                </header>
                <div class="footer-error-filter">
                    <input
                        type="text"
                        class="footer-error-filter-input"
                        placeholder="Filter errors..."
                        value={filterText}
                        oninput={handleFilterInput}
                        aria-label="Filter errors" />
                    <lightning-button-icon
                        icon-name="utility:delete"
                        alternative-text="Clear all errors"
                        title="Clear all errors"
                        onclick={handleClearErrors}
                        class="footer-error-filter-clear"
                        variant="bare"></lightning-button-icon>
                </div>
                <div class="footer-error-list-panel slds-flex-column">
                    <template lwc:if={filteredErrors}>
                        <ul class={errorListClass}>
                            <template for:each={filteredErrors} for:item="error">
                                <li
                                    key={error.id}
                                    class={error.class}
                                    data-id={error.id}
                                    onclick={handleErrorItemClick}
                                    role="button"
                                    tabindex="0">
                                    <span class="footer-error-list-meta">
                                        <span class="footer-error-list-time">
                                            [{error.formattedTime}]
                                        </span>
                                        <template lwc:if={error.source}>
                                            <span class="footer-error-list-source">
                                                [{error.source}]
                                            </span>
                                        </template>
                                    </span>
                                    <span class="footer-error-list-message">{error.message}</span>
                                </li>
                            </template>
                        </ul>
                    </template>
                    <template lwc:if={selectedError}>
                        <section class="footer-error-details" aria-label="Error details">
                            <h3 class="footer-error-details-title">Error Details</h3>
                            <dl class="footer-error-details-list">
                                <div class="footer-error-details-row">
                                    <dt class="footer-error-details-label">Time</dt>
                                    <dd class="footer-error-details-value">{selectedError.time}</dd>
                                </div>
                                <template lwc:if={selectedErrorSource}>
                                    <div class="footer-error-details-row">
                                        <dt class="footer-error-details-label">Source</dt>
                                        <dd class="footer-error-details-value">
                                            {selectedErrorSource}
                                        </dd>
                                    </div>
                                </template>
                                <div
                                    class="footer-error-details-row footer-error-details-row-message">
                                    <dt class="footer-error-details-label">Message</dt>
                                    <dd class="footer-error-details-value">
                                        <pre class="footer-error-pre footer-error-pre-message">
{selectedError.message}</pre
                                        >
                                    </dd>
                                </div>
                                <div
                                    class="footer-error-details-row footer-error-details-row-details">
                                    <dt class="footer-error-details-label">Details</dt>
                                    <dd class="footer-error-details-value">
                                        <pre class="footer-error-pre footer-error-pre-details">
{selectedError.details}</pre
                                        >
                                    </dd>
                                </div>
                            </dl>
                        </section>
                    </template>
                </div>
            </div>
        </template>
    </div>
</template>
