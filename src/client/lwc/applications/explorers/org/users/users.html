<template>
    <article class="slds-card">
        <div class="slds-card__header slds-grid">
            <header class="slds-media slds-media_center slds-has-flexi-truncate">
                <div class="slds-media__body">
                    <h2 class="slds-card__header-title">
                        <a href="#" class="slds-card__header-link slds-truncate" title="Users">
                            <span>Users</span>
                        </a>
                    </h2>
                </div>
                <div class="slds-no-flex">
                    <!--<slot name="header-button"></slot>-->
                    <lightning-button
                        icon-name="utility:link"
                        label="Users"
                        onclick={goToUrl}
                        data-url="/lightning/setup/ManageUsers/home"></lightning-button>
                </div>
            </header>
        </div>
        <div class="slds-card__body slds-card__body_inner org-users-body">
            <div class="org-users-scroll slds-scrollable_y">
                <div class="slds-grid slds-wrap slds-gutters_small org-users-grid">
                    <div class={containerClass}>
                        <dashboard-basic-stats
                            title="Active Users (30 Days)"
                            value={total_active}
                            sub-value={total_active_30days}></dashboard-basic-stats>
                    </div>
                    <div class={containerClass}>
                        <dashboard-basic-stats
                            title="Total Users"
                            value={total_users}></dashboard-basic-stats>
                    </div>
                    <div class={containerClass}>
                        <dashboard-basic-stats
                            title="Inactive Users"
                            value={total_inactive}></dashboard-basic-stats>
                    </div>
                </div>
            </div>
        </div>
    </article>
</template>
