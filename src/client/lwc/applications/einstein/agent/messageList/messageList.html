<template>
    <ul class="slds-chat-list" style="overflow-y: auto; overflow-anchor: auto">
        <template lwc:if={showStandaloneWelcome}>
            <agent-message item={welcomeMessage}></agent-message>
        </template>
        <template for:each={listMessages} for:item="item">
            <agent-message key={item._key} item={item}></agent-message>
        </template>
        <template lwc:if={streamingMessage}>
            <agent-message
                class="chat-item is-current-message"
                item={streamingMessage}
                is-current-message></agent-message>
        </template>
    </ul>
</template>
