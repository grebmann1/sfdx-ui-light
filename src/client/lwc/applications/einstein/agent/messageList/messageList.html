<template>
    <ul class="slds-chat-list" style="overflow-y: auto; overflow-anchor: auto">
        <!-- Welcome message: show only when no messages, or first message is not the welcome (e.g. new conversation) -->
        <template lwc:if={showStandaloneWelcome}>
            <agent-message item={welcomeMessage}></agent-message>
        </template>
        <!-- Messages (when phase is 'done', exclude last so "Thought for" appears above it) -->
        <template for:each={displayedMessagesForList} for:item="item">
            <agent-message key={item._key} item={item}></agent-message>
        </template>
        <!-- Reasoning (above message): Thinking / Thought for -->
        <template lwc:if={hasReasoningState}>
            <agent-reasoning-indicator reasoning-state={reasoningState}></agent-reasoning-indicator>
        </template>
        <!-- Last message when phase is 'done' (so "Thought for" sits above this message) -->
        <template lwc:if={lastDisplayedMessageWhenDone}>
            <agent-message key={lastDisplayedMessageWhenDone._key} item={lastDisplayedMessageWhenDone}></agent-message>
        </template>
        <template lwc:if={streamingMessage}>
            <agent-message
                class="chat-item is-current-message"
                item={streamingMessage}
                is-current-message></agent-message>
        </template>
    </ul>
</template>
