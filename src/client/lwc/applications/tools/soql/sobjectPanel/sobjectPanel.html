<template>
    <template lwc:if={isLoading}>
        <slds-spinner variant="brand" alternative-text="Loading" size="small"></slds-spinner>
    </template>
    <div class="slds-tree_container">
        <div>
            <div class="slds-grid slds-grid_align-spread slds-grid_vertical-align-center">
                <h2 class="slds-tree__group-header slds-truncate">
                    {i18n.SOBJECTS_PANEL_SOBJECTS}
                </h2>
                <lightning-button-icon
                    class="slds-p-right_small"
                    icon-name="utility:refresh"
                    variant="bare"
                    alternative-text="Refresh"
                    title="Refresh"
                    disabled={isLoading}
                    onclick={handleRefresh}></lightning-button-icon>
            </div>
        </div>
        <div class="sobjects-tree-wrapper">
            <slds-file-tree
                tree={computedTree}
                selected-id={selectedId}
                onselect={handleTreeSelect}
                search-fields={sobjectSearchFields}
                min-search-length={minSearchLength}
                is-delete-disabled></slds-file-tree>
        </div>
    </div>
</template>
