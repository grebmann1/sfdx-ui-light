<template>
    <template lwc:if={isNoRelationships}>
        <div class="slds-p-around_small">{i18n.RELATIONSHIPS_TREE_NO_MATCHING}</div>
    </template>
    <template lwc:else>
        <div class="relationships-tree-wrapper">
            <slds-file-tree
                class="slds-flex-column slds-full-height"
                tree={computedTree}
                selected-id={selectedId}
                onselect={handleTreeSelect}
                ontoggle={handleTreeToggle}
                search-fields={relationshipsSearchFields}
                min-search-length={minSearchLength}
                is-delete-disabled></slds-file-tree>
        </div>
    </template>
</template>
