<template>
    <template lwc:if={isLoading}>
        <div class="slds-is-relative" style="height: 2rem">
            <slds-spinner variant="brand" size="small" alternative-text="Loading"></slds-spinner>
        </div>
    </template>
    <template lwc:else>
        <template lwc:if={isNoFields}>
            <div class="slds-p-around_small">{i18n.FIELDS_TREE_NO_MATCHING_FIELD}</div>
        </template>
        <template lwc:else>
            <div class="fields-tree-wrapper">
                <slds-file-tree class="slds-flex-column slds-full-height"
                    tree={computedTree}
                    selected-id={selectedId}
                    onselect={handleTreeSelect}
                    ontoggle={handleTreeToggle}
                    search-fields={fieldsSearchFields}
                    min-search-length={minSearchLength}
                    is-delete-disabled></slds-file-tree>
            </div>
        </template>
    </template>
</template>
