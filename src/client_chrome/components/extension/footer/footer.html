<template>
    <div class="slds-utility-bar_container" style="height: 24px">
        <ul class="slds-utility-bar custom-utility-bar slds-p-horizontal_x-small">
            <li
                class="slds-utility-bar__item custom-utility-text custom-utility-left slds-truncate">
                <template lwc:if={isConnectorDisplayed}>
                    
                    <lightning-button
                        class="footer-utility-truncate custom-utility-text-copy"
                        icon-name="utility:copy"
                        label="Access Token"
                        onclick={handleCopyAccessToken}
                        title="Copy Access Token"
                        variant="base"
                    ></lightning-button>
                    <template lwc:if={isUsernameDisplayed}>
                        <div class="slds-vertical-separator"></div>
                        <lightning-button-icon
                            alternative-text="copy"
                            class="custom-utility-text-copy"
                            icon-name="utility:copy"
                            onclick={handleCopyUsername}
                            title="Copy Username"
                            variant="bare"></lightning-button-icon>
                        <a class="slds-truncate" href="#" onclick={handleUsernameClick}>
                            {usernameFormatted}
                        </a>
                    </template>
                </template>
            </li>
            <li
                class="slds-utility-bar__item custom-utility-text custom-utility-right slds-grid slds-grid_vertical-align-center slds-gutter_x-x-small footer-right">
                <template lwc:if={hasShortcutHints}>
                    <span class="footer-shortcut-hint" title="Keyboard shortcuts">
                        <template lwc:if={overlayShortcutFormatted}>
                            <span class="footer-shortcut-label">Overlay:</span>
                            <span class="footer-shortcut-key">{overlayShortcutFormatted}</span>
                        </template>
                        <template lwc:if={panelShortcutFormatted}>
                            <span lwc:if={overlayShortcutFormatted} class="footer-shortcut-sep">·</span>
                            <span class="footer-shortcut-label">Panel:</span>
                            <span class="footer-shortcut-key">{panelShortcutFormatted}</span>
                        </template>
                    </span>
                    <span class="slds-vertical-separator" lwc:if={hasShortcutAndVersion}></span>
                </template>
                <h2 class="slds-truncate footer-version">{versionFormatted}</h2>
                <!--
                    <lightning-button-icon
                    class="custom-utility-text-copy"
                    onclick={handleChangeVersionClick}
                    icon-name="utility:replace"
                    variant="bare"
                    alternative-text="Change Version"
                ></lightning-button-icon>
                -->
            </li>
        </ul>
    </div>
</template>
